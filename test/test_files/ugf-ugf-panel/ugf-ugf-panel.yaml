# Example input file

exawind:
  kynema_ugf_inp:
    - ugf_platform.yaml
    - ugf_panel.yaml
  num_timesteps: 10
  additional_picard_iterations: 2
  use_adaptive_holemap: true
  composite_body:
    - composite_name: first_body
      num_body_tags: 2
      body_tags: [1,2]
      dominance_tags: [0,1]
      search_tolerance: 1e-12
     
  # Variables for overset exchange
  ugf_vars:
    - velocity
    - pressure
    - turbulent_ke
    - specific_dissipation_rate
